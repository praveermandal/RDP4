name: V100 Hyper-Cluster (8 Machines)
on:
  workflow_dispatch:

jobs:
  spawn-cluster:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine-id: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Playwright & Linux Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Execute V100 Agent
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          MACHINE_NUMBER: ${{ matrix.machine-id }}
        run: |
          # Staggered start to prevent simultaneous login flags
          sleep $((MACHINE_NUMBER * 2))
          python main.py
