name: Phoenix V100 (Linux Dual-Turbo)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  # We add the runner index to the group name so they don't cancel each other!
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  run-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    # --- SCALE UP LOGIC ---
    strategy:
      matrix:
        machine-id: [1, 2] # This fires up 2 separate virtual machines
      fail-fast: false      # If machine 1 crashes, machine 2 keeps running
    # ----------------------

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install selenium selenium-stealth

    - name: 🔥 Run Phoenix Engine (Machine ${{ matrix.machine-id }})
      env:
        PYTHONIOENCODING: utf-8
        INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
        TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
        MESSAGES: ${{ secrets.MESSAGES }}
        MACHINE_INDEX: ${{ matrix.machine-id }} # Passes the ID to your script if needed
      run: |
        while true; do
          echo "🚀 Starting Linux Turbo Engine on Machine #${MACHINE_INDEX}..."
          
          if python main.py; then
            echo "✅ Script finished naturally."
          else
            echo "❌ Script crashed internally."
          fi
          
          echo "⚠️ Crash Detected. Respawning in 10 seconds..."
          sleep 10
        done
