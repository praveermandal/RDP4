name: V23 Mega-Cluster 24/7 (6-Hour Cycles)
on:
  schedule:
    - cron: '0 */6 * * *' # Triggers every 6 hours
  workflow_dispatch: 

jobs:
  launch-overdrive:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Hours
    strategy:
      matrix:
        machine-id: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install playwright
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run Masterpiece
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
          MACHINE_NUMBER: ${{ matrix.machine-id }}
        run: |
          sleep $(( (MACHINE_NUMBER - 1) * 5 ))
          python -u main.py
